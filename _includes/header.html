<header>
	<nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
		<a class="navbar-brand" href="#">[Maxim Kim]</a>
		<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
			<span class="navbar-toggler-icon"></span>
		</button>
		<div class="collapse navbar-collapse" id="navbarCollapse">
			<ul class="navbar-nav mr-auto">
				{% for item in site.data.nav %}
				<li class="nav-item {% if page.url == item.link %}active{% endif %}">
					<a class="nav-link" href="{{ item.link }}" class="button">{{ item.name }}</a>
				</li>
				{% endfor %}
			</ul>
	</nav>
	<!-- <li><a href="{{ item.link }}" {% if page.url == item.link %}class="button"{% endif %}>{{ item.name }}</a></li> -->
	<!-- <a href="{{ item.link }}" class="button">{{ item.name }}</a> -->
</header>
